# ROCm CI — compile-test the compatibility shims on gfx942.
#
# This workflow verifies that the ROCm compatibility layer compiles on
# real AMD hardware. It does NOT build the full Sirius binary (that needs
# hipDF+hipMM, which takes hours to build from source). Instead it:
#   1. Fetches the cuda2rocm shims
#   2. Compiles a test file that exercises every shim component
#   3. Compiles+links+runs the cuco-rocm tests (bloom_filter, static_set)
#
# When a self-hosted ROCm runner is available, this workflow will also
# attempt a full Sirius build with hipDF+hipMM.
name: ROCm Compile Test

on:
  push:
    branches:
      - main
      - feat/rocm-port
  pull_request:
    paths:
      - 'cmake/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'scripts/build_rocm_deps.sh'
      - 'scripts/hipdf_26.06_api_patch.sh'
      - '.github/workflows/rocm-test.yml'
  workflow_dispatch:  # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shim-compile-test:
    name: Shim compile test (gfx942)
    runs-on: ubuntu-latest
    # When a self-hosted ROCm runner is available, use it instead:
    # runs-on: [self-hosted, rocm, gfx942]
    steps:
      - uses: actions/checkout@v4

      - name: Check if this is a ROCm-related change
        id: check
        run: |
          if grep -q "ENABLE_ROCM" CMakeLists.txt; then
            echo "has_rocm=true" >> $GITHUB_OUTPUT
          else
            echo "has_rocm=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check.outputs.has_rocm == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ROCm (apt)
        if: steps.check.outputs.has_rocm == 'true'
        run: |
          # Install ROCm packages for the CI runner.
          # On a self-hosted runner with ROCm pre-installed, this step is a no-op.
          if ! command -v hipcc &>/dev/null; then
            echo "WARNING: hipcc not found. Installing ROCm packages..."
            wget -qO - https://repo.radeon.com/rocm/rocm.gpg.key | sudo apt-key add -
            echo "deb [arch=amd64] https://repo.radeon.com/rocm/apt/6.2 noble main" | sudo tee /etc/apt/sources.list.d/rocm.list
            # ubuntu-latest's own noble repos already ship generic hipcc/
            # rocminfo/rocm-cmake packages (versioned e.g. 6.0.0-1) that
            # satisfy other preinstalled packages' deps -- apt's default
            # version-based resolver prefers those over the ROCm 6.2 repo's
            # pinned versions (e.g. rocm-cmake 0.13.0.60200-66~24.04), so
            # `apt-get install rocm-dev` fails with unmet dependencies
            # ("Depends: rocm-cmake (= 0.13.0...) but 6.0.0-1 is to be
            # installed") every time without this. Pin the radeon.com origin
            # above Ubuntu's own repos so apt actually picks the versions
            # rocm-dev/rocm-utils require, instead of what a plain version
            # comparison would pick.
            echo -e "Package: *\nPin: origin repo.radeon.com\nPin-Priority: 1001" | \
              sudo tee /etc/apt/preferences.d/rocm-pin-600 > /dev/null
            sudo apt-get update
            sudo apt-get install -y rocm-dev rocm-utils hipblas-dev hipcub-dev rocthrust-dev
          else
            echo "hipcc already available: $(hipcc --version | head -1)"
          fi

      - name: Fetch cuda2rocm shims
        if: steps.check.outputs.has_rocm == 'true'
        run: |
          # Extract the FetchContent URL + hash from CMakeLists.txt
          URL=$(grep -oP 'URL https://github.com/[^ ]+' CMakeLists.txt | head -1 | cut -d' ' -f2)
          echo "Fetching: $URL"
          mkdir -p cmake/rocm_compat
          curl -sL "$URL" | tar xz --strip-components=2 -C cmake/rocm_compat
          ls cmake/rocm_compat/

      - name: Compile shim test
        if: steps.check.outputs.has_rocm == 'true'
        run: |
          cat > /tmp/test_shim.cu << 'EOF'
          #include <cuda_runtime.h>
          #include <cub/cub.cuh>
          #include <cuda/std/limits>
          #include <cuda/functional>
          #include <cooperative_groups.h>
          __global__ void k(int* o) {
            int v = cub::ShuffleIndex<64>(1, 0, 0xFFFFFFFFFFFFFFFFull);
            *o = v + cuda::std::numeric_limits<int>::max() + cuda::ceil_div(100, 64) + cuda::minimum<int>{}(3, 5);
          }
          int main() { return 0; }
          EOF
          hipcc -c -x hip /tmp/test_shim.cu -o /dev/null \
            -I cmake/rocm_compat --offload-arch=gfx942 2>&1
          echo "Shim compile: EXIT=$?"

      - name: Compile + run cuco-rocm tests
        if: steps.check.outputs.has_rocm == 'true'
        run: |
          # Clone cuda2rocm for the test files
          git clone --depth 1 https://github.com/hamstergamerszhang-ops/cuda2rocm.git /tmp/cuda2rocm

          # Bloom filter test
          hipcc -o /tmp/test_bf /tmp/cuda2rocm/cuco-rocm/tests/test_bloom_filter.cu \
            -I /tmp/cuda2rocm/cuco-rocm/include -I cmake/rocm_compat --offload-arch=gfx942 2>&1

          # Static set test
          hipcc -o /tmp/test_ss /tmp/cuda2rocm/cuco-rocm/tests/test_static_set.cu \
            -I /tmp/cuda2rocm/cuco-rocm/include -I cmake/rocm_compat --offload-arch=gfx942 2>&1

          # Actually RUNNING these binaries needs a real AMD GPU (/dev/kfd, the
          # ROCm kernel driver device node) -- GitHub-hosted ubuntu-latest
          # runners don't have one. Without this guard, fixing the push
          # trigger above would have turned "never runs" into "always fails
          # at the run step" on every push, which is worse than not running
          # at all for a repo under external review. Compilation itself is
          # still real, hardware-independent signal (cross-compiling HIP for
          # --offload-arch=gfx942 doesn't need the device present) -- only
          # the execution is gated. On a self-hosted ROCm runner (/dev/kfd
          # present), both binaries actually run for full verification.
          if [ -e /dev/kfd ]; then
            echo "Real ROCm device detected -- running compiled tests"
            /tmp/test_bf
            /tmp/test_ss
          else
            echo "No /dev/kfd on this runner (expected on GitHub-hosted "
            echo "ubuntu-latest) -- compile-only verification passed, "
            echo "skipping execution. Register a self-hosted ROCm runner "
            echo "for real runtime verification (see 'full-build' job below)."
          fi

  full-build:
    name: Full Sirius build (needs self-hosted ROCm runner)
    # This job only runs on a self-hosted ROCm runner with hipDF+hipMM pre-installed.
    # It is skipped on GitHub-hosted runners (no AMD GPU).
    if: false  # Enable when a self-hosted ROCm runner is registered
    runs-on: [self-hosted, rocm, gfx942]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build hipDF + hipMM (if not cached)
        run: |
          if ! find /opt/rocm -name "cudf-config.cmake" 2>/dev/null | grep -q .; then
            ./scripts/build_rocm_deps.sh --prefix /opt/rocm
          fi

      - name: Configure Sirius
        run: |
          cmake -B build/rocm -S . \
            -DENABLE_ROCM=ON \
            -DSIRIUS_ENABLE_CUCO=OFF \
            -DSIRIUS_ENABLE_CUCASCADE=OFF \
            -DSIRIUS_BUILD_S3_TESTS=OFF \
            -DSIRIUS_BUILD_TELEMETRY=OFF \
            -DCMAKE_HIP_ARCHITECTURES=gfx942

      - name: Build Sirius
        run: cmake --build build/rocm -j$(nproc)

      - name: Smoke test — run a query
        run: |
          # Load the extension and run a trivial query
          ./build/rocm/extension/sirius/sirius.duckdb_extension
          # If DuckDB CLI is available:
          # echo "LOAD 'build/rocm/extension/sirius/sirius.duckdb_extension'; SELECT 1;" | duckdb
